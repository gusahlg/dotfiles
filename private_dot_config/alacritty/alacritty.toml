# ~/.config/alacritty/alacritty.toml

[env]
TERM = "xterm-256color"

[window]
padding = { x = 0, y = 0 }
dynamic_padding = true
decorations = "full"
startup_mode = "Windowed"

[scrolling]
history = 10000

[font]
size = 12.0

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font"
style = "Italic"

[selection]
save_to_clipboard = true

[colors]
draw_bold_text_with_bright_colors = true

